services:
  - type: web
    name: myhouseplans
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run db:migrate && npm run start -- -p $PORT
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: myhouseplans-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: POSTGRES_SSL
        value: "true"
      - key: REQUIRE_DATABASE
        value: "true"
      - key: ADMIN_USERNAME
        value: issou
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: myhouseplans
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: myhouseplans-db
    plan: starter
    databaseName: myhouseplans
    user: myhouseplans
